<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cyber Security Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: black;
            color: #00ffcc;
            font-family: Consolas;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #00ffcc;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #001a1a;
        }

        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        tr:hover {
            background: #002222;
        }

        .delete-icon {
            color: #00ffcc;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-icon:hover {
            color: #ff0000;
            transform: scale(1.2);
            text-shadow: 0 0 10px red;
        }
    </style>

</head>

<body>

    <h1>⚠ Cyber Security Monitor ⚠</h1>

    <table>

        <tr>
            <th>Face</th>
            <th>Status</th>
            <th>IP Address</th>
            <th>Device</th>
            <th>Time</th>
            <th>Action</th>
        </tr>

        {% for log in logs %}

        <tr>

            <td>

                {% if log.face_image %}
                <img src="{{ log.face_image.url }}">
                {% else %}
                No Image
                {% endif %}

            </td>

            <td>{{ log.status }}</td>

            <td>{{ log.ip_address }}</td>

            <td>{{ log.device_info }}</td>

            <td>{{ log.login_time }}</td>

            <td>
                <a href="{% url 'delete_log' log.id %}"
                    onclick="return confirm('Are you sure you want to delete this log?')">
                    <i class="bi bi-trash3-fill delete-icon"></i>
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
